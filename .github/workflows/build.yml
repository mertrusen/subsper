name: Build

# Builds the Windows .exe and macOS .dmg in the cloud (no local machine needed).
# - Push to main: builds both and uploads them as downloadable artifacts.
# - Tag vX.Y.Z: a single release job publishes ONE GitHub Release with both files.

on:
  push:
    tags: [ 'v*' ]      # release builds only on version tags (no duplicate per commit)
  workflow_dispatch:    # manual test build from the Actions tab ("Run workflow")

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      # cmake + MSVC are preinstalled on windows-latest.
      - run: npm install
      - name: Build bundled engine (whisper.cpp + ffmpeg)
        run: node scripts/fetch-binaries.mjs
      - run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist/*.exe
          if-no-files-found: error

  macos:
    runs-on: macos-15   # Apple Silicon runner (fast) cross-compiling to darwin-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: brew install cmake || true
      - run: npm install
        env:
          npm_config_arch: x64
      - name: Build bundled engine (whisper.cpp + ffmpeg)
        run: node scripts/fetch-binaries.mjs
        env:
          FORCE_MAC_X64: "1"
      - run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist/*.dmg
          if-no-files-found: error

  # One release, created after BOTH builds finish (avoids the create-release race).
  release:
    needs: [windows, macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/win-installer/*.exe
            artifacts/mac-installer/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
