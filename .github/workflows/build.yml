name: Build

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

# A new build supersedes any in-progress one (no more piled-up duplicate builds).
concurrency:
  group: build-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/1.3.296.0/windows/VulkanSDK-1.3.296.0-Installer.exe" -OutFile "VulkanSDK.exe"
          .\VulkanSDK.exe --accept-licenses --default-answer --confirm-command install
          echo "VULKAN_SDK=C:\VulkanSDK\1.3.296.0" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "C:\VulkanSDK\1.3.296.0\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          
          git clone https://github.com/KhronosGroup/SPIRV-Headers.git C:\SPIRV-Headers-Src
          Set-Location -Path C:\SPIRV-Headers-Src
          cmake -B build -DCMAKE_INSTALL_PREFIX="C:\SPIRV-Headers"
          cmake --build build --target install
          echo "CMAKE_PREFIX_PATH=C:\SPIRV-Headers;C:\VulkanSDK\1.3.296.0" | Out-File -FilePath $env:GITHUB_ENV -Append
          Set-Location -Path $env:GITHUB_WORKSPACE
      - run: npm install
      # Cache the compiled whisper-cli + ffmpeg so it's built ONCE, not every
      # release. Key changes only when the build script changes → instant after
      # the first build (cuts ~20 min Windows compile to seconds).
      - name: Cache engine binaries
        uses: actions/cache@v4
        with:
          path: bin
          key: engine-${{ runner.os }}-${{ hashFiles('scripts/fetch-binaries.mjs') }}
      - run: npm run dist:win   # runs prep (skips compile on cache hit) then packages
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist/*.exe
          if-no-files-found: error

  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: brew install cmake || true
      - run: npm install
      - name: Cache engine binaries
        uses: actions/cache@v4
        with:
          path: bin
          key: engine-${{ runner.os }}-${{ hashFiles('scripts/fetch-binaries.mjs') }}
      - run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist/*.dmg
          if-no-files-found: error

  release:
    needs: [windows, macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/win-installer/*.exe
            artifacts/mac-installer/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
